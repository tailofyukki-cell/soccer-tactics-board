<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サッカー戦術ボード</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 操作パネル -->
  <div id="control-panel">
    <div class="panel-group">
      <span class="panel-title">⚽ サッカー戦術ボード</span>
    </div>

    <div class="panel-group">
      <label class="panel-label">自チーム</label>
      <select id="formation-own">
        <option value="4-4-2">4-4-2</option>
        <option value="4-2-3-1" selected>4-2-3-1</option>
        <option value="3-4-2-1">3-4-2-1</option>
        <option value="4-3-3">4-3-3</option>
        <option value="3-5-2">3-5-2</option>
        <option value="5-3-2">5-3-2</option>
      </select>
      <button id="btn-apply-own" class="btn btn-primary">適用</button>
    </div>

    <div class="panel-group">
      <label class="panel-label">相手チーム</label>
      <select id="formation-opponent">
        <option value="4-4-2">4-4-2</option>
        <option value="4-2-3-1" selected>4-2-3-1</option>
        <option value="3-4-2-1">3-4-2-1</option>
        <option value="4-3-3">4-3-3</option>
        <option value="3-5-2">3-5-2</option>
        <option value="5-3-2">5-3-2</option>
      </select>
      <button id="btn-apply-opponent" class="btn btn-secondary">適用</button>
    </div>

    <div class="panel-group">
      <button id="btn-reset" class="btn btn-secondary">リセット</button>
    </div>

    <div class="panel-group">
      <label class="panel-label">表示</label>
      <label class="toggle-label">
        <input type="checkbox" id="toggle-opponent" checked />
        <span>相手チーム</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="toggle-name" checked />
        <span>名前</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="toggle-number" checked />
        <span>背番号</span>
      </label>
    </div>

    <div class="panel-group">
      <label class="panel-label">データ</label>
      <button id="btn-save" class="btn btn-primary">保存</button>
      <button id="btn-load" class="btn btn-secondary">読込</button>
      <button id="btn-png" class="btn btn-accent">PNG出力</button>
      <button id="btn-fullscreen" class="btn btn-secondary">全画面</button>
    </div>
  </div>

  <!-- キャンバス -->
  <div id="canvas-container">
    <canvas id="pitch-canvas"></canvas>
  </div>

  <!-- 選手編集モーダル -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <h3>選手情報の編集</h3>

      <!-- 画像エリア -->
      <div class="image-edit-area">
        <div id="img-preview-wrap" class="img-preview-wrap">
          <canvas id="img-preview-canvas" width="80" height="80"></canvas>
          <div class="img-preview-hint">ダブルクリックで<br>画像を選択</div>
        </div>
        <div class="image-edit-controls">
          <label class="btn btn-secondary btn-sm" for="edit-image-input">
            画像を選択
          </label>
          <input type="file" id="edit-image-input" accept="image/*" style="display:none" />
          <button id="edit-image-clear" class="btn btn-danger btn-sm">画像を削除</button>
        </div>
      </div>

      <div class="form-row">
        <label>背番号</label>
        <input type="number" id="edit-number" min="1" max="99" />
      </div>
      <div class="form-row">
        <label>名前</label>
        <input type="text" id="edit-name" maxlength="10" placeholder="選手名" />
      </div>
      <div class="modal-buttons">
        <button id="edit-ok" class="btn btn-primary">OK</button>
        <button id="edit-cancel" class="btn btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 通知トースト -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
